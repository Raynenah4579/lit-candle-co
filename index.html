<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lit Candle Co. | East Coast Luxury</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Playfair+Display:italic,wght@400;700&family=Inter:wght@200;300;400&display=swap');

        :root {
            --gold: #D4AF37;
            --cream: #F9F7F2;
            --black: #0C0C0C;
        }

        body {
            background-color: var(--cream);
            color: var(--black);
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        .display-font { font-family: 'Cinzel', serif; }
        .serif-italic { font-family: 'Playfair Display', serif; font-style: italic; }

        .gold-text {
            background: linear-gradient(to right, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .reveal {
            opacity: 0;
            transform: translateY(20px);
            transition: all 1s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        .nav-link {
            letter-spacing: 0.2em;
            font-size: 10px;
            text-transform: uppercase;
        }

        .hero-container {
            position: relative;
            height: 100vh;
            width: 100%;
            background: var(--black);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .btn-outline {
            border: 1px solid rgba(255,255,255,0.4);
            padding: 1rem 3rem;
            color: white;
            text-transform: uppercase;
            letter-spacing: 0.4em;
            font-size: 10px;
            transition: all 0.4s ease;
            text-decoration: none;
        }

        .btn-outline:hover {
            background: white;
            color: black;
        }
    </style>
</head>
<body>

    <nav class="fixed w-full z-50 px-6 md:px-12 py-8 flex justify-between items-center mix-blend-difference text-white">
        <div class="hidden md:flex gap-8">
            <a href="#" class="nav-link">Collections</a>
            <a href="#" class="nav-link">The Craft</a>
        </div>
        
        <div class="md:absolute md:left-1/2 md:-translate-x-1/2">
            <span class="display-font tracking-[0.4em] text-sm md:text-xl font-bold">LIT</span>
        </div>

        <div class="flex gap-8 items-center">
            <a href="#" class="nav-link">Shop All</a>
        </div>
    </nav>

    <section class="hero-container">
        <div class="absolute inset-0">
            <img src="https://images.unsplash.com/photo-1570823635306-250abb06d4b3?auto=format&fit=crop&q=80&w=2000" alt="Lit Candle Co" class="w-full h-full object-cover">
            <div class="absolute inset-0 bg-black/40"></div> 
        </div>
        
        <div class="relative z-10 text-center text-white px-4">
            <span class="gold-text uppercase tracking-[0.6em] text-[10px] mb-6 block font-light reveal">Premium Fragrance House</span>
            <h1 class="display-font text-5xl md:text-8xl tracking-[0.2em] mb-8 reveal" style="transition-delay: 0.2s;">
                Lit Candle Co.
            </h1>
            <p class="serif-italic text-lg md:text-2xl opacity-90 max-w-2xl mx-auto mb-12 reveal" style="transition-delay: 0.4s;">
                Hand-poured on the East Coast.
            </p>
            <div class="reveal" style="transition-delay: 0.6s;">
                <a href="#collections" class="btn-outline">
                    Explore The Gold Edition
                </a>
            </div>
        </div>
    </section>

    <section id="collections" class="py-32 px-6 bg-white">
        <div class="max-w-4xl mx-auto text-center">
             <h2 class="display-font text-3xl uppercase tracking-widest mb-6">Our Craft</h2>
             <p class="serif-italic text-xl opacity-60">Hand-finished luxury in every pour.</p>
        </div>
    </section>

    <script>
        function reveal() {
            var reveals = document.querySelectorAll(".reveal");
            for (var i = 0; i < reveals.length; i++) {
                var windowHeight = window.innerHeight;
                var elementTop = reveals[i].getBoundingClientRect().top;
                if (elementTop < windowHeight - 100) {
                    reveals[i].classList.add("active");
                }
            }
        }
        window.addEventListener("scroll", reveal);
        window.addEventListener("load", reveal);
    </script>
</body>
</html>
</body>
</html>
